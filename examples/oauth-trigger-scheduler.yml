name: "OAuth Refresh Scheduler"

# 定期的にOAuth更新をトリガー
on:
  schedule:
    # 10分ごとに実行
    - cron: '*/10 * * * *'

permissions:
  contents: read
  actions: write  # repository_dispatch送信に必要

jobs:
  trigger-oauth-refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger OAuth Refresh
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: context.repo.owner,
              repo: context.repo.repo,
              event_type: 'oauth-refresh',
              client_payload: {
                timestamp: new Date().toISOString(),
                source: 'scheduled'
              }
            });
            console.log('OAuth refresh triggered via repository_dispatch');
