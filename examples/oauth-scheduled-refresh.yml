name: "Claude OAuth Token Scheduled Refresh"

# repository_dispatchイベントを使用（base1551/claude-code-actionが対応）
on:
  repository_dispatch:
    types: [oauth-refresh]

  # 手動実行（テスト用）
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force OAuth token refresh'
        required: false
        default: 'true'

# セキュリティ：必要最小限の権限のみ付与
permissions:
  contents: read
  id-token: write  # OIDC token取得に必要
  issues: write    # issue作成に必要
  # 注意: secrets権限は存在しません
  # secretsの更新は GITHUB_TOKEN を使用してREST APIで実行

jobs:
  # 定期実行用のトリガーissue作成
  create-trigger:
    if: github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Create OAuth Refresh Trigger Issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[AUTO] OAuth Token Refresh Trigger',
              body: '@claude __SCHEDULED_OAUTH_REFRESH__'
            });
            console.log(`Created trigger issue #${issue.data.number}`);

  scheduled-refresh:
    name: "Scheduled Token Refresh"
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'repository_dispatch'

    steps:
      - name: Security Check
        run: |
          echo "🔒 セキュリティチェックを実行中..."
          echo "実行者: ${{ github.actor }}"
          echo "実行理由: ${{ github.event_name }}"
          echo "リポジトリ: ${{ github.repository }}"

      - name: OAuth Token Scheduled Refresh
        id: refresh-token
        uses: base1551/claude-code-action@main
        with:
          # OAuth自動リフレッシュ専用のトリガー
          direct_prompt: "__SCHEDULED_OAUTH_REFRESH__"
          use_oauth: "true"
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_access_token: ${{ secrets.CLAUDE_ACCESS_TOKEN }}
          claude_refresh_token: ${{ secrets.CLAUDE_REFRESH_TOKEN }}
          claude_expires_at: ${{ secrets.CLAUDE_EXPIRES_AT }}

      - name: Verify Scheduled Refresh
        if: steps.refresh-token.conclusion == 'success'
        run: |
          echo "✅ スケジュールされたトークンリフレッシュが完了しました"
          echo "次回の更新: repository_dispatch で手動実行"
          echo "🔐 新しいトークンはGitHub Secretsに安全に保存されました"

      - name: Handle Refresh Failure
        if: failure() && steps.refresh-token.conclusion == 'failure'
        run: |
          echo "❌ スケジュールされたトークンリフレッシュに失敗しました"
          echo "手動での対応が必要です"
          echo "Actionsタブで詳細なエラーログを確認してください"
          echo "⚠️ セキュリティ上の理由により、トークン情報はログに記録されません"
